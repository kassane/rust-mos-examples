name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  RUSTC_BOOTSTRAP: 1

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux-amd64
            sdk_archive: llvm-mos-linux.tar.xz
            rust_archive: rust-mos-x86_64-linux-glibc.tar.xz
            rust_dir: rust-mos-x86_64-linux-glibc
          - os: macos-latest
            name: Apple-arm64
            sdk_archive: llvm-mos-macos.tar.xz
            rust_archive: rust-mos-aarch64-apple-darwin.tar.gz
            rust_dir: rust-mos-aarch64-apple-darwin
          - os: windows-latest
            name: Windows-amd64
            sdk_archive: llvm-mos-windows.7z
            rust_archive: rust-mos-x86_64-pc-windows-msvc.zip
            rust_dir: rust-mos-x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@main

      - name: Extract toolchains
        env:
          SDK_ARCHIVE: ${{ matrix.sdk_archive }}
          RUST_ARCHIVE: ${{ matrix.rust_archive }}
          RUST_DIR: ${{ matrix.rust_dir }}
        run: |
          curl -fsSL -O "https://github.com/llvm-mos/llvm-mos-sdk/releases/download/v23.0.1/${SDK_ARCHIVE}"
          curl -fsSL -O "https://github.com/kassane/rust-mos-examples/releases/download/v0.0.0/${RUST_ARCHIVE}"
          if [[ "${SDK_ARCHIVE}" == *.7z ]]; then 7z x "${SDK_ARCHIVE}"; else tar -xf "${SDK_ARCHIVE}"; fi
          if [[ "${RUST_ARCHIVE}" == *.zip ]]; then unzip -q "${RUST_ARCHIVE}"; else tar -xf "${RUST_ARCHIVE}"; fi

      - name: Configure environment
        env:
          RUST_DIR: ${{ matrix.rust_dir }}
        run: |
          RUSTDIR="$PWD/${RUST_DIR}"
          SDKDIR="$PWD/llvm-mos"
          if command -v cygpath &>/dev/null; then
            RUSTDIR=$(cygpath -w "$RUSTDIR")
            SDKDIR=$(cygpath -w "$SDKDIR")
            echo "RUSTC=${RUSTDIR}\\bin\\rustc.exe" >> "$GITHUB_ENV"
            echo "${RUSTDIR}\\bin" >> "$GITHUB_PATH"
            echo "${SDKDIR}\\bin" >> "$GITHUB_PATH"
            echo "LLVM_MOS_SDK=${SDKDIR}" >> "$GITHUB_ENV"
          else
            echo "RUSTC=${RUSTDIR}/bin/rustc" >> "$GITHUB_ENV"
            echo "${RUSTDIR}/bin" >> "$GITHUB_PATH"
            echo "${SDKDIR}/bin" >> "$GITHUB_PATH"
            echo "LLVM_MOS_SDK=${SDKDIR}" >> "$GITHUB_ENV"
          fi
          for RUSTLIBDIR in "${RUSTDIR}/lib/rustlib" "${RUSTDIR}\\lib\\rustlib"; do
            if [ -d "$RUSTLIBDIR" ]; then
              HOST_TRIPLE=$(ls "$RUSTLIBDIR" 2>/dev/null | head -1)
              if [ -n "$HOST_TRIPLE" ]; then
                echo "${RUSTLIBDIR}/${HOST_TRIPLE}/bin" >> "$GITHUB_PATH"
              fi
              break
            fi
          done

      - name: Build demo-sim
        env:
          RUSTFLAGS: -Clink-arg=-flto -Clink-arg=-Wl,-u,main -Clink-arg=-Qunused-arguments -A linker_messages
        run: cargo build --target targets/mos-sim-none.json -Zbuild-std -Zunstable-options -Zjson-target-spec --release -p demo-sim

      - name: Build demo-c64
        env:
          RUSTFLAGS: -Clink-arg=-flto -Clink-arg=-Wl,-u,main -Clink-arg=-Qunused-arguments -A linker_messages
        run: cargo build --target targets/mos-c64-none.json -Zbuild-std -Zunstable-options -Zjson-target-spec --release -p demo-c64

      - name: Build demo-nes
        env:
          RUSTFLAGS: -Clink-arg=-flto -Clink-arg=-Wl,-u,main -Clink-arg=-Qunused-arguments -A linker_messages
        run: |
          set -euo pipefail
          for mapper in nrom cnrom unrom unrom-512 mmc1 mmc3 gtrom action53; do
            cargo build --target "targets/mos-nes-${mapper}-none.json" -Zbuild-std -Zunstable-options -Zjson-target-spec --release -p demo-nes --bin "nes-${mapper}-hello"
            case "$mapper" in
              unrom) extra="unrom-color-cycle" ;;
              cnrom) extra="cnrom-sprites" ;;
              mmc1)  extra="mmc1-sprites" ;;
              mmc3)  extra="mmc3-pads" ;;
              gtrom) extra="gtrom-color-cycle" ;;
              *)     extra="" ;;
            esac
            if [ -n "$extra" ]; then
              cargo build --target "targets/mos-nes-${mapper}-none.json" -Zbuild-std -Zunstable-options -Zjson-target-spec --release -p demo-nes --bin "nes-${extra}"
            fi
          done

      - name: Build demo-mega65
        env:
          RUSTFLAGS: -Clink-arg=-flto -Clink-arg=-Wl,-u,main -Clink-arg=-Qunused-arguments -A linker_messages
        run: cargo build --target targets/mos-mega65-none.json -Zbuild-std -Zunstable-options -Zjson-target-spec --release -p demo-mega65

      - name: Verify outputs
        run: |
          find target -name "*.elf" -o -name "*.exe" 2>/dev/null | while read f; do
            echo "FOUND: $f"
          done
